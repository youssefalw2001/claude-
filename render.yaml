services:
  - type: web
    name: fox-ai-platform
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
    healthCheckPath: /health
