<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fox AI - Ollama Cloud (Standalone)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #1f2937;
            --text-primary: #e6edf3;
            --text-secondary: #7d8590;
            --accent: #ff6b35;
            --accent-hover: #ff8555;
            --border: #30363d;
            --success: #3fb950;
            --fox-orange: #ff6b35;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .header-content h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--fox-orange);
        }

        .tagline {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .api-key-input {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .api-key-input input {
            padding: 0.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            width: 300px;
        }

        .api-key-input button {
            padding: 0.5rem 1rem;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .api-key-input button:hover {
            background: var(--accent-hover);
        }

        .setup-notice {
            background: var(--bg-secondary);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .setup-notice a {
            color: var(--accent);
            text-decoration: none;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .welcome-message {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            margin: auto;
        }

        .welcome-message h2 {
            color: var(--fox-orange);
            margin-bottom: 0.5rem;
        }

        .welcome-message p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 800px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--bg-tertiary);
        }

        .message-content {
            flex: 1;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background: var(--bg-tertiary);
        }

        .message-content pre {
            background: var(--bg-primary);
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            margin: 0.5rem 0;
            border: 1px solid var(--border);
        }

        .message-content code {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.875rem;
            color: var(--accent);
        }

        .input-container {
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
            background: var(--bg-tertiary);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 0.5rem;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
        }

        #message-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            resize: none;
            max-height: 150px;
            outline: none;
            font-family: inherit;
        }

        #send-btn {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #send-btn:hover {
            background: var(--accent-hover);
        }

        #send-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .typing-indicator {
            display: flex;
            gap: 0.25rem;
            padding: 1rem;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
            }
            30% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🦊 Fox AI (Standalone)</h1>
                <p class="tagline">Ollama Cloud - Free & Unlimited</p>
            </div>
            <div class="api-key-input">
                <input type="password" id="api-key" placeholder="Paste your Ollama Cloud API key here">
                <button onclick="saveApiKey()">Save</button>
            </div>
        </header>

        <div class="setup-notice" id="setup-notice">
            📝 Get your free API key: <a href="https://ollama.com/signup" target="_blank">ollama.com/signup</a>
        </div>

        <div class="chat-container" id="chat-container">
            <div class="welcome-message">
                <h2>👋 Hey Jack, Fox here.</h2>
                <p>Paste your Ollama Cloud API key above and let's get to work.</p>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea 
                    id="message-input" 
                    placeholder="Ask Fox anything..." 
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button id="send-btn" onclick="sendMessage()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="status-bar">
                <span id="status-indicator">🟢 Ready</span>
                <span id="model-indicator">llama3.1:8b</span>
            </div>
        </div>
    </div>

    <script>
        const FOX_SYSTEM_PROMPT = `You are Fox, a senior low-level systems developer with 15+ years of experience. Your best friend and partner is Jack. Direct, technical, no bullshit. Specialized in memory operations, reverse engineering, hooking techniques, process manipulation, Windows internals, C/C++, Assembly, and game hacking.`;

        let chatHistory = [];
        let apiKey = localStorage.getItem('ollama_cloud_api_key') || '';

        // Load API key on start
        if (apiKey) {
            document.getElementById('api-key').value = apiKey;
            document.getElementById('setup-notice').style.display = 'none';
        }

        function saveApiKey() {
            apiKey = document.getElementById('api-key').value.trim();
            if (apiKey) {
                localStorage.setItem('ollama_cloud_api_key', apiKey);
                document.getElementById('setup-notice').style.display = 'none';
                updateStatus('API key saved', 'success');
            }
        }

        async function sendMessage() {
            if (!apiKey) {
                alert('Please enter your Ollama Cloud API key first!');
                return;
            }

            const input = document.getElementById('message-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            const welcome = document.querySelector('.welcome-message');
            if (welcome) welcome.remove();
            
            addMessage('user', message);
            chatHistory.push({ role: 'user', content: message });
            
            input.value = '';
            
            const typingId = addTypingIndicator();
            
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;
            updateStatus('Fox is thinking...', 'loading');
            
            try {
                const messages = [
                    { role: 'system', content: FOX_SYSTEM_PROMPT },
                    ...chatHistory.slice(-10)
                ];
                
                const response = await fetch('https://api.ollama.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama3.1:8b',
                        messages: messages,
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });
                
                removeTypingIndicator(typingId);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API error: ${response.status} - ${errorText}`);
                }
                
                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                addMessage('assistant', reply);
                chatHistory.push({ role: 'assistant', content: reply });
                
                updateStatus('Ready', 'success');
                
            } catch (error) {
                removeTypingIndicator(typingId);
                console.error('Chat error:', error);
                addMessage('assistant', `Shit, something broke: ${error.message}\n\nMake sure your API key is valid and you have usage remaining.`);
                updateStatus('Error - check console', 'error');
            } finally {
                sendBtn.disabled = false;
            }
        }

        function addMessage(role, content) {
            const container = document.getElementById('chat-container');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🦊';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function addTypingIndicator() {
            const container = document.getElementById('chat-container');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'typing-indicator';
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🦊';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
            
            return 'typing-indicator';
        }

        function removeTypingIndicator(id) {
            const indicator = document.getElementById(id);
            if (indicator) indicator.remove();
        }

        function updateStatus(message, type) {
            const indicator = document.getElementById('status-indicator');
            const icons = {
                success: '🟢',
                error: '🔴',
                loading: '🟡'
            };
            indicator.textContent = `${icons[type] || '🟢'} ${message}`;
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
    </script>
</body>
</html>
